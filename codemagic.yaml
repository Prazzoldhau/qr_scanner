workflows:
  android-release:
    name: QR Scanner - Android
    max_build_duration: 30
    instance_type: linux_x2
    environment:
      flutter: stable
      # To publish a signed release build, add a keystore in
      # Codemagic > Team settings > Code signing identities, then uncomment
      # the two lines below (replace "qr_scanner_keystore" with your reference name).
      # android_signing:
      #   - qr_scanner_keystore
      vars:
        PACKAGE_NAME: "com.example.qrscanner"
    scripts:
      - name: Write key.properties (only if a keystore is configured)
        script: |
          if [ -n "$CM_KEYSTORE_PATH" ]; then
            cat > $CM_BUILD_DIR/android/key.properties <<EOF
          storeFile=$CM_KEYSTORE_PATH
          storePassword=$CM_KEYSTORE_PASSWORD
          keyAlias=$CM_KEY_ALIAS
          keyPassword=$CM_KEY_PASSWORD
          EOF
          else
            echo "No keystore configured - building with debug signing."
          fi
      - name: Get Flutter packages
        script: flutter pub get
      - name: Build Android APK
        script: flutter build apk --release
      - name: Build Android App Bundle
        script: flutter build appbundle --release
    artifacts:
      - build/app/outputs/flutter-apk/*.apk
      - build/app/outputs/bundle/**/*.aab
    publishing:
      email:
        recipients:
          - aestheticphysiox@gmail.com
        notify:
          success: true
          failure: true
